name: Update menu and deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "20 23 27-31 * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tesseract
        shell: powershell
        run: |
          choco install tesseract --yes
          New-Item -ItemType Directory -Force -Path .\tools\tessdata | Out-Null
          Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/kor.traineddata" -OutFile ".\tools\tessdata\kor.traineddata"
          Copy-Item "C:\Program Files\Tesseract-OCR\tessdata\eng.traineddata" ".\tools\tessdata\eng.traineddata" -Force
          Copy-Item "C:\Program Files\Tesseract-OCR\tessdata\osd.traineddata" ".\tools\tessdata\osd.traineddata" -Force

      - name: Generate latest menu data
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\tools\update-month-menu.ps1

      - name: Prepare Pages artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path .\pages\data | Out-Null
          Copy-Item .\app\src\main\assets\meal_current.json .\pages\data\meal_current.json -Force
          Copy-Item .\app\src\main\assets\meal_metadata.json .\pages\data\meal_metadata.json -Force

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
